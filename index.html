<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 자막 번역기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f3f0ff; margin: 0; padding: 40px; display: flex; justify-content: center; align-items: center; min-height: 90vh; }
        .container { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(107, 70, 193, 0.1); width: 100%; max-width: 600px; text-align: center; }
        
        h1 { color: #6b46c1; margin-bottom: 25px; font-size: 28px; }
        input[type="file"] { display: none; }
        
        .config-box { background: #f7fafc; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: left; border: 1px solid #e2e8f0; }
        .config-box label { font-size: 13px; font-weight: bold; color: #4a5568; display: block; margin-bottom: 8px; }
        
        .engine-radio-group { display: flex; gap: 20px; background: white; padding: 10px; border-radius: 6px; border: 1px solid #edf2f7; margin-bottom: 15px; }
        .engine-radio-group label { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: normal; color: #4a5568; margin: 0; cursor: pointer; }
        .engine-radio-group input[type="radio"] { margin: 0; cursor: pointer; }

        .lang-select-group { display: flex; gap: 15px; margin-bottom: 12px; }
        .lang-select-group:last-child { margin-bottom: 0; }
        .lang-select-group div { flex: 1; }
        .lang-select-group select, .lang-select-group input[type="text"], .lang-select-group input[type="number"] { width: 100%; padding: 8px; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 13px; margin-top: 6px; cursor: pointer; box-sizing: border-box; }

        .slider-wrap { margin-top: 6px; background: white; padding: 12px; border-radius: 6px; border: 1px solid #edf2f7; }
        .slider-wrap input[type="range"] { width: 100%; cursor: pointer; accent-color: #6b46c1; }
        .slider-labels { display: flex; justify-content: space-between; font-size: 11px; color: #718096; margin-top: 4px; padding: 0 2px; }

        .advanced-trigger { font-size: 13px; font-weight: bold; color: #6b46c1; text-align: left; margin-bottom: 15px; cursor: pointer; display: inline-block; user-select: none; }
        .advanced-box { display: none; background: #edf2f7; padding: 15px; border-radius: 6px; margin-bottom: 20px; text-align: left; border: 1px solid #cbd5e0; }

        .main-workspace { display: flex; flex-direction: column; gap: 20px; margin-bottom: 20px; }
        
        .file-label { display: block; background: #f7fafc; border: 2px dashed #b794f4; padding: 30px 20px; border-radius: 12px; cursor: pointer; color: #4a5568; font-weight: bold; transition: all 0.2s; font-size: 16px; }
        .file-label.dragover { background: #e8dff5; border-color: #6b46c1; transform: scale(1.01); }
        
        .file-list-container { text-align: left; background: #fafafa; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; max-height: 140px; overflow-y: auto; display: none; }
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #edf2f7; font-size: 13px; }
        .file-item:last-child { border-bottom: none; }
        .file-name { color: #4a5568; font-weight: 500; }
        .file-status { font-size: 12px; font-weight: bold; color: #a0aec0; }
        
        .textarea-block { text-align: left; display: flex; flex-direction: column; gap: 8px; }
        .textarea-block label { font-size: 13px; font-weight: bold; color: #4a5568; }
        textarea { width: 96%; height: 100px; padding: 10px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 13px; resize: vertical; font-family: inherit; box-sizing: border-box; width: 100%; }
        
        .text-action-row { display: flex; justify-content: flex-end; margin-top: -4px; }
        .btn-mini-download { background: #3182ce; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; display: none; }
        .btn-mini-download:hover { background: #2b6cb0; }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button.main-action { color: white; border: none; padding: 15px 20px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; flex: 1; transition: background 0.2s; }
        
        .btn-start { background: #6b46c1; } .btn-start:hover { background: #553c9a; }
        .btn-pause { background: #dd6b20; display: none; } .btn-pause:hover { background: #c05621; }
        .btn-resume { background: #3182ce; display: none; } .btn-resume:hover { background: #2b6cb0; }
        .btn-stop { background: #e53e3e; display: none; } .btn-stop:hover { background: #9b2c2c; }
        .btn-download-all { background: #2f855a; display: none; width: 100%; margin-top: 15px; }
        .btn-download-all:hover { background: #22543d; }
        
        .progress-container { margin-top: 25px; display: none; text-align: left; border-top: 2px solid #edf2f7; padding-top: 20px; }
        .progress-header { display: flex; justify-content: space-between; font-size: 13px; color: #4a5568; font-weight: bold; margin-bottom: 8px; }
        progress { width: 100%; height: 12px; border-radius: 6px; appearance: none; }
        progress::-webkit-progress-bar { background-color: #edf2f7; border-radius: 6px; }
        progress::-webkit-progress-value { background-color: #6b46c1; border-radius: 6px; }
        
        .status-dashboard { display: flex; justify-content: space-between; font-size: 12px; color: #718096; margin-top: 8px; font-weight: bold; }
        #etaMessage { color: #dd6b20; }

        .error-log-box { display: none; margin-top: 20px; padding: 15px; background-color: #fff5f5; border: 1px solid #fed7d7; border-radius: 8px; text-align: left; }
        .error-log-box textarea { width: 100%; height: 80px; font-family: monospace; font-size: 12px; color: #9b2c2c; background: #fff; border: 1px solid #feb2b2; border-radius: 4px; padding: 8px; resize: none; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h1>AI 자막 번역기</h1>
    
    <div class="config-box">
        <label>번역 엔진</label>
        <div class="engine-radio-group">
            <label><input type="radio" name="engineRadio" value="google_free" checked onchange="toggleEngineRoute()"> Google 번역</label>
            <label><input type="radio" name="engineRadio" value="deepxl" onchange="toggleEngineRoute()"> DeepXL 로컬 엔진</label>
        </div>
        
        <div class="lang-select-group">
            <div>
                <label for="sourceLang">입력 언어</label>
                <select id="sourceLang">
                    <option value="auto" selected>자동 인식</option>
                    <option value="en">영어</option>
                    <option value="ko">한국어</option>
                    <option value="ja">일본어</option>
                    <option value="zh-CN">중국어</option>
                    <option value="es">스페인어</option>
                    <option value="fr">프랑스어</option>
                    <option value="de">독일어</option>
                </select>
            </div>
            <div>
                <label for="targetLang">출력 언어</label>
                <select id="targetLang">
                    <option value="ko" selected>한국어</option>
                    <option value="en">영어</option>
                    <option value="ja">일본어</option>
                    <option value="zh-CN">중국어</option>
                    <option value="es">스페인어</option>
                    <option value="fr">프랑스어</option>
                    <option value="de">독일어</option>
                </select>
            </div>
        </div>
        
        <div class="lang-select-group" id="toneSelectWrap" style="display:none;">
            <div>
                <label>번역체</label>
                <div class="slider-wrap">
                    <input type="range" id="toneSlider" min="0" max="2" value="0">
                    <div class="slider-labels">
                        <span>구어체</span>
                        <span>기본</span>
                        <span>문어체</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="advanced-trigger" onclick="toggleAdvancedMenu()">⚙️ 고급 설정 (Advanced Settings) ▼</div>
    <div id="advancedBox" class="advanced-box">
        <div class="lang-select-group">
            <div style="flex: 2;">
                <label for="protectedWords">🚫 번역 제외 단어 (쉼표로 구분)</label>
                <input type="text" id="protectedWords" placeholder="예: Gemini, 뉴존">
            </div>
            <div style="flex: 1;">
                <label for="chunkSizeInput">📦 청크 크기</label>
                <input type="number" id="chunkSizeInput" value="25" min="5" max="100">
            </div>
        </div>
    </div>

    <div class="main-workspace">
        <div>
            <div id="dropZone" class="file-label">📂 자막 파일 열기</div>
            <input type="file" id="srtFiles" accept=".srt,.smi,.txt" multiple>
        </div>
        
        <div id="fileListContainer" class="file-list-container"></div>
        
        <div class="textarea-block">
            <label for="textInput">텍스트 입력</label>
            <textarea id="textInput" placeholder="직접 번역할 원문 내용을 적어주세요..."></textarea>
        </div>
        
        <div class="textarea-block">
            <label for="textOutput">번역 결과</label>
            <textarea id="textOutput" placeholder="번역 완료 시 여기에 출력됩니다..." readonly></textarea>
        </div>
        
        <div class="text-action-row">
            <button type="button" id="downloadTextBtn" class="btn-mini-download" onclick="downloadDirectText()">💾 결과 텍스트 다운로드</button>
        </div>
    </div>
    
    <div class="btn-group">
        <button id="startBtn" class="main-action btn-start" onclick="executeTranslationCore()">번역 시작</button>
        <button id="pauseBtn" class="main-action btn-pause" onclick="pausePipeline()">일시정지</button>
        <button id="resumeBtn" class="main-action btn-resume" onclick="resumePipeline()">재시작</button>
        <button id="stopBtn" class="main-action btn-stop" onclick="stopPipeline()">중지</button>
    </div>
    
    <div id="progressContainer" class="progress-container">
        <div class="progress-header">
            <span id="currentFileName">대기 중</span>
            <span id="progressPercent">0%</span>
        </div>
        <progress id="progressBar" value="0" max="100"></progress>
        
        <div class="status-dashboard">
            <span id="statusMessage">0 / 0 줄 완료</span>
            <span id="etaMessage"></span>
        </div>
        
        <button id="downloadAllBtn" class="main-action btn-download-all" onclick="downloadAllFilesStored()">📦 번역 완료된 파일 모두 받기</button>
    </div>
    
    <div id="errorLogBox" class="error-log-box">
        <h4>⚠️ 오류가 발생했습니다.</h4>
        <textarea id="errorTextarea" readonly onclick="this.select()"></textarea>
    </div>
</div>

<script>
    const fileInput = document.getElementById('srtFiles');
    const dropZone = document.getElementById('dropZone');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resumeBtn = document.getElementById('resumeBtn');
    const stopBtn = document.getElementById('stopBtn');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const downloadTextBtn = document.getElementById('downloadTextBtn');
    const fileListContainer = document.getElementById('fileListContainer');
    const errorLogBox = document.getElementById('errorLogBox');
    const errorTextarea = document.getElementById('errorTextarea');

    const apiAddress = "http://localhost:1188/translate";
    let selectedFiles = [];
    let isPaused = false;
    let isStopped = false;
    let translatedStorage = [];

    function toggleAdvancedMenu() {
        const box = document.getElementById('advancedBox');
        const trigger = document.querySelector('.advanced-trigger');
        if (box.style.display === 'block') {
            box.style.display = 'none';
            trigger.innerText = '⚙️ 고급 설정 (Advanced Settings) ▼';
        } else {
            box.style.display = 'block';
            trigger.innerText = '⚙️ 고급 설정 (Advanced Settings) ▲';
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('sourceLang').value = "auto";
        document.getElementById('targetLang').value = "ko";
        
        const savedEngine = localStorage.getItem('my_trans_engine');
        if (savedEngine) {
            const radio = document.querySelector(`input[name="engineRadio"][value="${savedEngine}"]`);
            if (radio) radio.checked = true;
        }
        toggleEngineRoute();

        const savedWords = localStorage.getItem('my_protected_words');
        if (savedWords) document.getElementById('protectedWords').value = savedWords;
        const savedChunk = localStorage.getItem('my_chunk_size');
        if (savedChunk) document.getElementById('chunkSizeInput').value = savedChunk;
        const savedSlider = localStorage.getItem('my_tone_slider_val');
        if (savedSlider) document.getElementById('toneSlider').value = savedSlider;
    });

    function toggleEngineRoute() {
        const engine = document.querySelector('input[name="engineRadio"]:checked').value;
        document.getElementById('toneSelectWrap').style.display = engine === 'deepxl' ? 'block' : 'none';
        localStorage.setItem('my_trans_engine', engine);
    }

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault(); dropZone.classList.remove('dragover');
        handleFiles(Array.from(e.dataTransfer.files).filter(f => f.name.match(/\.(srt|smi|txt)$/i)));
    });

    function handleFiles(files) {
        selectedFiles = Array.from(files);
        translatedStorage = [];
        downloadAllBtn.style.display = 'none';
        
        if (selectedFiles.length > 0) {
            fileListContainer.innerHTML = '';
            fileListContainer.style.display = 'block';
            selectedFiles.forEach((file, idx) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `<span class="file-name">${idx + 1}. ${file.name}</span><span class="file-status" id="fileStatus_${idx}">대기 중</span>`;
                fileListContainer.appendChild(item);
            });
        } else {
            fileListContainer.style.display = 'none';
        }
        errorLogBox.style.display = 'none';
    }

    function pausePipeline() { isPaused = true; pauseBtn.style.display = 'none'; resumeBtn.style.display = 'block'; }
    function resumePipeline() { isPaused = false; resumeBtn.style.display = 'none'; pauseBtn.style.display = 'block'; }
    function stopPipeline() { isStopped = true; isPaused = false; hideControlButtons(); }
    function showControlButtons() { startBtn.style.display = 'none'; pauseBtn.style.display = 'block'; stopBtn.style.display = 'block'; }
    function hideControlButtons() { startBtn.style.display = 'block'; pauseBtn.style.display = 'none'; resumeBtn.style.display = 'none'; stopBtn.style.display = 'none'; }

    function triggerDownload(fileName, content) {
        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = fileName;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    document.downloadSingleFile = function(idx) {
        const item = translatedStorage.find(t => t.index === idx);
        if (item) triggerDownload(item.name, item.content);
    }

    function downloadAllFilesStored() {
        translatedStorage.forEach(item => triggerDownload(item.name, item.content));
    }

    function downloadDirectText() {
        const outText = document.getElementById('textOutput').value;
        if (outText) triggerDownload('translated_text.txt', outText);
    }

    function protectAndTranslate(textBlock, sourceLang, targetLang, toneStyle, engine, words) {
        let textData = textBlock;
        const placeholders = [];

        words.forEach((word, idx) => {
            if(!word) return;
            const regex = new RegExp(escapeRegExp(word), 'gi');
            textData = textData.replace(regex, (match) => {
                placeholders.push({ token: `UNTRANSLATABLETOKEN${idx}`, original: match });
                return `UNTRANSLATABLETOKEN${idx}`;
            });
        });

        return requestTranslation(textData, sourceLang, targetLang, toneStyle, engine).then(translated => {
            let finalOutput = translated;
            placeholders.forEach(p => {
                finalOutput = finalOutput.replace(new RegExp(p.token, 'g'), p.original);
            });
            return finalOutput;
        });
    }

    function escapeRegExp(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    async function requestTranslation(textBlock, sourceLang, targetLang, toneStyle, engine) {
        if (engine === 'google_free') {
            const sl = sourceLang === 'auto' ? 'auto' : sourceLang.toLowerCase();
            const tl = targetLang.toLowerCase();
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(textBlock)}`;
            
            const res = await fetch(url);
            if (!res.ok) throw new Error(`Google API 통신 실패 (${res.status})`);
            const data = await res.json();
            return data[0].map(x => x[0]).join('');
        } else {
            const res = await fetch(apiAddress, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    text: textBlock,
                    source_lang: sourceLang === 'auto' ? '' : sourceLang.toUpperCase(),
                    target_lang: targetLang.toUpperCase(),
                    formality: toneStyle
                })
            });
            const data = await res.json();
            if (!res.ok || data.error) throw new Error(data.error || `서버 에러: ${res.status}`);
            return data.data || data.text || "";
        }
    }

    function executeTranslationCore() {
        document.getElementById('sourceLang').value = "auto";
        document.getElementById('targetLang').value = "ko";
        
        const textVal = document.getElementById('textInput').value.trim();
        if (textVal) startTextModeTranslation(textVal);
        if (selectedFiles.length > 0) startFileModeTranslation();
        if (!textVal && selectedFiles.length === 0) alert('번역할 텍스트를 적거나 자막 파일을 올려주세요!');
    }

    async function startTextModeTranslation(textInput) {
        const sourceLang = "auto";
        const targetLang = "ko";
        const engine = document.querySelector('input[name="engineRadio"]:checked').value;
        const sliderVal = document.getElementById('toneSlider').value;
        const toneStyle = sliderVal === "0" ? "less" : (sliderVal === "2" ? "more" : "default");
        const protectedWords = document.getElementById('protectedWords').value.split(',').map(w => w.trim());

        startBtn.disabled = true;
        downloadTextBtn.style.display = 'none';
        errorLogBox.style.display = 'none';

        try {
            const result = await protectAndTranslate(textInput, sourceLang, targetLang, toneStyle, engine, protectedWords);
            document.getElementById('textOutput').value = result;
            downloadTextBtn.style.display = 'inline-block';
        } catch(e) {
            console.error(e);
            errorTextarea.value = `[텍스트 번역 에러]\n사유: ${e.message}`;
            errorLogBox.style.display = 'block';
        } finally {
            startBtn.disabled = false;
        }
    }

    async function startFileModeTranslation() {
        const sourceLang = "auto";
        const targetLang = "ko";
        const engine = document.querySelector('input[name="engineRadio"]:checked').value;
        const sliderVal = document.getElementById('toneSlider').value;
        const toneStyle = sliderVal === "0" ? "less" : (sliderVal === "2" ? "more" : "default");
        
        const protectedWords = document.getElementById('protectedWords').value.split(',').map(w => w.trim());
        const chunkSize = parseInt(document.getElementById('chunkSizeInput').value) || 25;
        
        localStorage.setItem('my_protected_words', document.getElementById('protectedWords').value);
        localStorage.setItem('my_chunk_size', chunkSize);
        localStorage.setItem('my_tone_slider_val', sliderVal);
        
        isStopped = false; isPaused = false;
        showControlButtons();
        errorLogBox.style.display = 'none';
        downloadAllBtn.style.display = 'none';
        
        document.getElementById('progressContainer').style.display = 'block';
        const progressBar = document.getElementById('progressBar');
        const progressPercent = document.getElementById('progressPercent');
        const statusMessage = document.getElementById('statusMessage');
        const etaMessage = document.getElementById('etaMessage');

        for (let i = 0; i < selectedFiles.length; i++) {
            if (isStopped) break;
            
            const currentFile = selectedFiles[i];
            document.getElementById('currentFileName').innerText = currentFile.name;
            
            const statusLabel = document.getElementById(`fileStatus_${i}`);
            if (statusLabel) { statusLabel.innerText = "번역 중..."; statusLabel.style.color = "#dd6b20"; }
            
            const text = await currentFile.text();
            const currentLines = text.split(/\r?\n/);
            const currentTranslatedLines = [...currentLines];
            
            const isSrt = currentFile.name.toLowerCase().endsWith('.srt');
            
            const textTasks = [];
            for (let j = 0; j < currentLines.length; j++) {
                const line = currentLines[j].trim();
                if (line) {
                    if (isSrt && (/^\d+$/.test(line) || line.includes('-->'))) continue;
                    textTasks.push({ index: j, text: line });
                }
            }

            let totalTasks = textTasks.length;
            let startTime = Date.now();

            for (let j = 0; j < totalTasks; j += chunkSize) {
                if (isStopped) break;
                while (isPaused) { if (isStopped) break; await new Promise(res => setTimeout(res, 200)); }
                if (isStopped) break;

                const chunk = textTasks.slice(j, j + chunkSize);
                const textToTranslate = chunk.map(t => t.text).join('\n');

                try {
                    const rawTranslatedText = await protectAndTranslate(textToTranslate, sourceLang, targetLang, toneStyle, engine, protectedWords);
                    const translatedLines = rawTranslatedText.split('\n').map(l => l.trim());

                    if (translatedLines.length === chunk.length) {
                        for (let k = 0; k < chunk.length; k++) {
                            currentTranslatedLines[chunk[k].index] = translatedLines[k];
                        }
                    } else {
                        for (let k = 0; k < chunk.length; k++) {
                            const singleText = await protectAndTranslate(chunk[k].text, sourceLang, targetLang, toneStyle, engine, protectedWords);
                            currentTranslatedLines[chunk[k].index] = singleText;
                        }
                    }

                } catch (e) {
                    console.error(e);
                    errorTextarea.value = `[파일 번역 에러]\n사유: ${e.message}`;
                    errorLogBox.style.display = 'block';
                    if (statusLabel) { statusLabel.innerText = "실패"; statusLabel.style.color = "#e53e3e"; }
                    stopTranslation();
                    break;
                }

                let currentProgress = Math.min(j + chunk.length, totalTasks);
                let currentPercent = Math.floor((currentProgress / totalTasks) * 100);
                progressBar.value = currentPercent;
                progressPercent.innerText = `${currentPercent}%`;
                statusMessage.innerText = `${currentProgress} / ${totalTasks} 줄 완료`;

                if (j > 0 && !isPaused) {
                    const elapsedTime = (Date.now() - startTime) / 1000;
                    const remainingTime = Math.round((elapsedTime / currentProgress) * (totalTasks - currentProgress));
                    const mins = Math.floor(remainingTime / 60); const secs = remainingTime % 60;
                    etaMessage.innerText = mins > 0 ? `남은 시간: 약 ${mins}분 ${secs}초` : `남은 시간: 약 ${secs}초`;
                }
                
                await new Promise(res => setTimeout(res, 250));
            }

            if (!isStopped && errorLogBox.style.display !== 'block') {
                const extMatch = currentFile.name.match(/\.([a-z0-9]+)$/i);
                const ext = extMatch ? extMatch[1] : 'srt';
                const baseName = currentFile.name.replace(/\.[^/.]+$/, "");
                const targetFileName = `${baseName}_ko.${ext}`;
                
                translatedStorage.push({ index: i, name: targetFileName, content: currentTranslatedLines.join('\n') });
                if (statusLabel) statusLabel.innerHTML = `<button class="btn-mini-download" onclick="document.downloadSingleFile(${i})">다운로드</button>`;
            }
        }

        hideControlButtons();
        etaMessage.innerText = '';
        if (!isStopped && errorLogBox.style.display !== 'block') {
            statusMessage.innerText = '🎉 완료!';
            if (selectedFiles.length > 1) downloadAllBtn.style.display = 'block';
        }
    }
</script>
</body>
</html>
