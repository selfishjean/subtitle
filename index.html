<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 자막 번역기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f3f0ff; margin: 0; padding: 40px; display: flex; justify-content: center; align-items: center; min-height: 90vh; }
        .container { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(107, 70, 193, 0.1); width: 100%; max-width: 520px; text-align: center; }
        
        h1 { color: #6b46c1; margin-bottom: 10px; font-size: 28px; }
        p { color: #718096; margin-bottom: 25px; font-size: 14px; }
        input[type="file"] { display: none; }
        
        .config-box { background: #f7fafc; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: left; border: 1px solid #e2e8f0; }
        .config-box label { font-size: 13px; font-weight: bold; color: #4a5568; display: block; margin-bottom: 8px; margin-top: 12px; }
        .config-box label:first-child { margin-top: 0; }
        .config-box input[type="password"] { width: 93%; padding: 8px; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 13px; margin-bottom: 5px; }
        
        /* 라디오 버튼 그룹 스타일 */
        .radio-group { display: flex; flex-direction: column; gap: 8px; background: white; padding: 10px; border-radius: 6px; border: 1px solid #edf2f7; }
        .radio-group label { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: normal; color: #4a5568; margin: 0; cursor: pointer; }
        .radio-group input[type="radio"] { margin: 0; width: auto; cursor: pointer; }

        .file-label { display: block; background: #f7fafc; border: 2px dashed #b794f4; padding: 40px 20px; border-radius: 12px; cursor: pointer; margin-bottom: 25px; color: #4a5568; font-weight: bold; transition: all 0.2s; }
        .file-label.dragover { background: #e8dff5; border-color: #6b46c1; transform: scale(1.02); }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        button { color: white; border: none; padding: 15px 20px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; flex: 1; transition: background 0.2s; }
        
        .btn-start { background: #6b46c1; } .btn-start:hover { background: #553c9a; }
        .btn-pause { background: #dd6b20; display: none; } .btn-pause:hover { background: #c05621; }
        .btn-resume { background: #3182ce; display: none; } .btn-resume:hover { background: #2b6cb0; }
        .btn-stop { background: #e53e3e; display: none; } .btn-stop:hover { background: #9b2c2c; }
        
        .progress-container { margin-top: 25px; display: none; text-align: left; }
        .progress-text { font-size: 14px; color: #4a5568; font-weight: bold; margin-bottom: 8px; display: flex; justify-content: space-between; }
        progress { width: 100%; height: 12px; border-radius: 6px; appearance: none; margin-bottom: 10px; }
        progress::-webkit-progress-bar { background-color: #edf2f7; border-radius: 6px; }
        progress::-webkit-progress-value { background-color: #6b46c1; border-radius: 6px; }
        
        #statusMessage { font-size: 13px; color: #4a5568; font-weight: bold; line-height: 1.5; }
        #etaMessage { font-size: 13px; color: #dd6b20; font-weight: bold; text-align: right; margin-top: -18px; }
        
        .error-log-box { display: none; margin-top: 20px; padding: 15px; background-color: #fff5f5; border: 1px solid #fed7d7; border-radius: 8px; text-align: left; }
        .error-log-box h4 { margin: 0 0 8px 0; color: #c53030; font-size: 14px; }
        .error-log-box textarea { width: 95%; height: 100px; font-family: monospace; font-size: 12px; color: #9b2c2c; background: #fff; border: 1px solid #feb2b2; border-radius: 4px; padding: 8px; resize: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>AI 자막 번역기</h1>
    <p>대량의 SRT 파일을 오류 없이 자연스럽게 번역합니다.</p>
    
    <div class="config-box">
        <!-- 문구 심플화 반영 완료 -->
        <label>🔑 Gemini API</label>
        <input type="password" id="apiKey" placeholder="AI Studio에서 발급받은 키를 붙여넣으세요">
        
        <!-- 모델명 라디오 버튼화 반영 완료 -->
        <label>🤖 AI 모델명</label>
        <div class="radio-group">
            <label><input type="radio" name="modelRadio" value="gemini-1.5-flash" checked> gemini-1.5-flash (무료 한도 넉넉함)</label>
            <label><input type="radio" name="modelRadio" value="gemini-2.0-flash"> gemini-2.0-flash (최신 고성능 무료)</label>
        </div>
        
        <!-- 번역체 라디오 버튼화 반영 완료 -->
        <label>🗣️ 번역체</label>
        <div class="radio-group">
            <label><input type="radio" name="toneRadio" value="해요체 (~해요, ~했습니다 같은 친근한 존댓말)" checked> 친근한 존댓말 (~해요)</label>
            <label><input type="radio" name="toneRadio" value="하십시오체 (~합니다, ~정의합니다 같은 격식있는 존댓말)"> 격식있는 존댓말 (~합니다)</label>
            <label><input type="radio" name="toneRadio" value="해라체 (~다, ~자 같은 친근한 반말)"> 친근한 반말 (~어/다)</label>
        </div>
    </div>

    <div id="dropZone" class="file-label">
        📂 SRT 파일을 여기에 떨어뜨리거나 클릭하세요
    </div>
    <input type="file" id="srtFiles" accept=".srt" multiple>
    
    <div id="fileCount" style="margin-bottom: 25px; font-weight: bold; color: #6b46c1;">선택된 파일 없음</div>
    
    <div class="btn-group">
        <button id="startBtn" class="btn-start" onclick="startTranslation()">번역 시작</button>
        <button id="pauseBtn" class="btn-pause" onclick="pauseTranslation()">일시정지</button>
        <button id="resumeBtn" class="btn-resume" onclick="resumeTranslation()">재시작</button>
        <button id="stopBtn" class="btn-stop" onclick="stopTranslation()">중지</button>
    </div>
    
    <div id="progressContainer" class="progress-container">
        <div class="progress-text">
            <span id="currentFileName">대기 중</span>
            <span id="progressPercent">0%</span>
        </div>
        <progress id="progressBar" value="0" max="100"></progress>
        <div id="statusMessage"></div>
        <div id="etaMessage"></div>
    </div>
    
    <div id="errorLogBox" class="error-log-box">
        <h4>⚠️ 에러가 발생하여 번역이 중단되었습니다.</h4>
        <p style="font-size:11px; color:#718096; margin:0 0 8px 0; text-align:left;">아래 텍스트 상자의 에러 로그를 복사(Ctrl+C)해서 전달해 주세요.</p>
        <textarea id="errorTextarea" readonly onclick="this.select()"></textarea>
    </div>
</div>

<script>
    const fileInput = document.getElementById('srtFiles');
    const dropZone = document.getElementById('dropZone');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resumeBtn = document.getElementById('resumeBtn');
    const stopBtn = document.getElementById('stopBtn');
    
    const errorLogBox = document.getElementById('errorLogBox');
    const errorTextarea = document.getElementById('errorTextarea');

    let selectedFiles = [];
    let isPaused = false;
    let isStopped = false;
    
    let currentFile = null;
    let currentLines = [];
    let currentTranslatedLines = [];

    // 브라우저 로컬스토리지 복구 (라디오 버튼 버전 맞춤형)
    window.addEventListener('DOMContentLoaded', () => {
        const savedKey = localStorage.getItem('my_gemini_api_key');
        if (savedKey) document.getElementById('apiKey').value = savedKey;
        
        const savedModel = localStorage.getItem('my_gemini_model_radio');
        if (savedModel) {
            const modelRadio = document.querySelector(`input[name="modelRadio"][value="${savedModel}"]`);
            if (modelRadio) modelRadio.checked = true;
        }
        
        const savedTone = localStorage.getItem('my_gemini_tone_radio');
        if (savedTone) {
            const toneRadio = document.querySelector(`input[name="toneRadio"][value="${savedTone}"]`);
            if (toneRadio) toneRadio.checked = true;
        }
    });

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault(); dropZone.classList.remove('dragover');
        handleFiles(Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.srt')));
    });

    function handleFiles(files) {
        selectedFiles = Array.from(files);
        document.getElementById('fileCount').innerText = `선택된 파일: ${selectedFiles.length}개`;
        errorLogBox.style.display = 'none';
    }

    function pauseTranslation() { isPaused = true; pauseBtn.style.display = 'none'; resumeBtn.style.display = 'block'; document.getElementById('statusMessage').innerText = `⏸️ 일시정지됨`; }
    function resumeTranslation() { isPaused = false; resumeBtn.style.display = 'none'; pauseBtn.style.display = 'block'; }
    function stopTranslation() { isStopped = true; isPaused = false; hideControlButtons(); document.getElementById('statusMessage').innerText = `🛑 중지됨`; }
    function showControlButtons() { startBtn.style.display = 'none'; pauseBtn.style.display = 'block'; stopBtn.style.display = 'block'; }
    function hideControlButtons() { startBtn.style.display = 'block'; pauseBtn.style.display = 'none'; resumeBtn.style.display = 'none'; stopBtn.style.display = 'none'; }

    function triggerDownload(fileName, content) {
        const blob = new Blob([content], { type: 'text/srt' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = fileName;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    async function startTranslation() {
        const apiKey = document.getElementById('apiKey').value.trim();
        
        // 체크된 라디오 버튼의 값 동적 추출
        const modelRadioNode = document.querySelector('input[name="modelRadio"]:checked');
        const toneRadioNode = document.querySelector('input[name="toneRadio"]:checked');
        
        if (!apiKey) return alert('Gemini API 키를 입력해 주세요!');
        if (!modelRadioNode) return alert('모델을 선택해 주세요!');
        if (!toneRadioNode) return alert('번역체를 선택해 주세요!');
        if (selectedFiles.length === 0) return alert('파일을 업로드해 주세요!');
        
        const modelName = modelRadioNode.value;
        const selectedTone = toneRadioNode.value;
        
        // 선택한 세팅 브라우저에 안전 보존
        localStorage.setItem('my_gemini_api_key', apiKey);
        localStorage.setItem('my_gemini_model_radio', modelName);
        localStorage.setItem('my_gemini_tone_radio', selectedTone);
        
        isStopped = false; isPaused = false;
        showControlButtons();
        errorLogBox.style.display = 'none';
        
        document.getElementById('progressContainer').style.display = 'block';
        const progressBar = document.getElementById('progressBar');
        const progressPercent = document.getElementById('progressPercent');
        const statusMessage = document.getElementById('statusMessage');
        const etaMessage = document.getElementById('etaMessage');

        for (let i = 0; i < selectedFiles.length; i++) {
            if (isStopped) break;
            
            currentFile = selectedFiles[i];
            document.getElementById('currentFileName').innerText = `[${i + 1}/${selectedFiles.length}] ${currentFile.name}`;
            
            const text = await currentFile.text();
            currentLines = text.split(/\r?\n/);
            currentTranslatedLines = [...currentLines];
            
            const textTasks = [];
            for (let j = 0; j < currentLines.length; j++) {
                const line = currentLines[j].trim();
                if (line && !/^\d+$/.test(line) && !line.includes('-->')) {
                    textTasks.push({ index: j, text: line });
                }
            }

            let totalTasks = textTasks.length;
            let startTime = Date.now();
            let chunkSize = 50; 

            for (let j = 0; j < totalTasks; j += chunkSize) {
                if (isStopped) break;
                while (isPaused) { if (isStopped) break; await new Promise(res => setTimeout(res, 200)); }
                if (isStopped) break;

                const chunk = textTasks.slice(j, j + chunkSize);
                const formattedLines = chunk.map(t => `[${t.index}] ${t.text}`).join('\n');

                const prompt = `You are an expert subtitle translator. Translate the following video subtitles into natural Korean.
                
[RULES]
1. Use consistent tone: "${selectedTone}".
2. Keep the "[ID]" prefix exactly as given at the start of each line. Do not alter the number inside the brackets.
3. Translate the text after the "[ID]" naturally based on the flow of the entire block.
4. Output ONLY the translated lines with their prefixes. No extra conversational commentary.

[Subtitles to translate]:
${formattedLines}`;

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    
                    const data = await res.json();
                    
                    if (data.error && data.error.code === 429) {
                        etaMessage.innerText = "";
                        chunkSize = Math.max(15, Math.floor(chunkSize / 2));
                        
                        for (let countdown = 15; countdown > 0; countdown--) {
                            if (isStopped) break;
                            statusMessage.innerText = `⚠️ 한도 도달! 덩치를 ${chunkSize}줄로 줄여 ${countdown}초 뒤 자동 재시도합니다...`;
                            await new Promise(res => setTimeout(res, 1000));
                        }
                        j -= chunk.length; 
                        continue;       
                    }
                    
                    if (data.error) {
                        throw new Error(`[구글 API 오류]\n코드: ${data.error.code}\n메시지: ${data.error.message}`);
                    }
                    
                    const responseText = data.candidates[0].content.parts[0].text.trim();
                    const translatedLinesArr = responseText.split('\n');

                    translatedLinesArr.forEach(l => {
                        const match = l.trim().match(/^\[(\d+)\]\s*(.*)/);
                        if (match) {
                            const originIdx = parseInt(match[1]);
                            const translatedText = match[2];
                            currentTranslatedLines[originIdx] = translatedText;
                        }
                    });

                } catch (e) {
                    console.error(e);
                    errorTextarea.value = e.message || e.toString() || "알 수 없는 시스템 통신 장애 발생";
                    errorLogBox.style.display = 'block';
                    stopTranslation();
                    break;
                }

                let currentProgress = Math.min(j + chunk.length, totalTasks);
                let currentPercent = Math.floor((currentProgress / totalTasks) * 100);
                progressBar.value = currentPercent;
                progressPercent.innerText = `${currentPercent}%`;
                statusMessage.innerText = `${currentProgress} / ${totalTasks} 줄 완료 (현재 묶음: ${chunkSize}줄)`;

                if (j > 0 && !isPaused) {
                    const elapsedTime = (Date.now() - startTime) / 1000;
                    const remainingTime = Math.round((elapsedTime / currentProgress) * (totalTasks - currentProgress));
                    const mins = Math.floor(remainingTime / 60); const secs = remainingTime % 60;
                    etaMessage.innerText = mins > 0 ? `남은 시간: 약 ${mins}분 ${secs}초` : `남은 시간: 약 ${secs}초`;
                }
                
                await new Promise(res => setTimeout(res, 600));
            }

            if (!isStopped && errorLogBox.style.display !== 'block') {
                triggerDownload(currentFile.name.replace('.srt', '_ko.srt'), currentTranslatedLines.join('\n'));
            }
        }

        hideControlButtons();
        etaMessage.innerText = '';
        if (!isStopped && errorLogBox.style.display !== 'block') {
            statusMessage.innerText = '🎉 모든 파일 번역 완료!';
        }
    }
</script>
</body>
</html>
