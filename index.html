<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 자막 번역기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f3f0ff; margin: 0; padding: 40px; display: flex; justify-content: center; align-items: center; min-height: 90vh; }
        .container { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(107, 70, 193, 0.1); width: 100%; max-width: 600px; text-align: center; }
        h1 { color: #6b46c1; margin-bottom: 25px; font-size: 28px; }
        input[type="file"] { display: none; }
        .config-box { background: #f7fafc; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: left; border: 1px solid #e2e8f0; }
        .config-box label { font-size: 13px; font-weight: bold; color: #4a5568; display: block; margin-bottom: 8px; }
        .engine-radio-group { display: flex; gap: 20px; background: white; padding: 10px; border-radius: 6px; border: 1px solid #edf2f7; margin-bottom: 15px; }
        .engine-radio-group label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #4a5568; margin: 0; cursor: pointer; }
        .lang-select-group { display: flex; gap: 15px; margin-bottom: 12px; }
        .lang-select-group div { flex: 1; }
        .lang-select-group select, .lang-select-group input { width: 100%; padding: 8px; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 13px; margin-top: 6px; box-sizing: border-box; }
        .slider-wrap { margin-top: 6px; background: white; padding: 12px; border-radius: 6px; border: 1px solid #edf2f7; }
        .slider-wrap input { width: 100%; cursor: pointer; accent-color: #6b46c1; }
        .main-workspace { display: flex; flex-direction: column; gap: 20px; margin-bottom: 10px; }
        .file-label { display: block; background: #f7fafc; border: 2px dashed #b794f4; padding: 30px 20px; border-radius: 12px; cursor: pointer; color: #4a5568; font-weight: bold; font-size: 16px; }
        .info-counter-bar { display: none; justify-content: flex-start; gap: 15px; font-size: 12px; color: #4a5568; background: #f7fafc; border: 1px solid #e2e8f0; padding: 8px 12px; border-radius: 6px; font-weight: bold; }
        .info-counter-bar span { background: #e8dff5; padding: 2px 8px; border-radius: 4px; color: #6b46c1; }
        .textarea-block { text-align: left; display: flex; flex-direction: column; gap: 8px; }
        textarea { width: 100%; height: 200px; padding: 10px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 13px; box-sizing: border-box; font-family: monospace; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .btn-row { display: flex; gap: 10px; width: 100%; }
        button.main-action { color: white; border: none; padding: 15px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; flex: 1; }
        .btn-start { background: #6b46c1; }
        .btn-pause { background: #dd6b20; display: none; }
        .btn-resume { background: #3182ce; display: none; }
        .btn-stop { background: #e53e3e; display: none; }
        .error-log-box { display: none; margin-top: 20px; padding: 15px; background-color: #fff5f5; border: 1px solid #fed7d7; border-radius: 8px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>AI 자막 번역기</h1>
    <div class="config-box">
        <label>번역 엔진</label>
        <div class="engine-radio-group">
            <label><input type="radio" name="engineRadio" value="google_free" checked onchange="toggleEngineRoute()"> Google 번역</label>
            <label><input type="radio" name="engineRadio" value="deepxl" onchange="toggleEngineRoute()"> DeepXL 로컬 엔진</label>
        </div>
        <div class="lang-select-group">
            <div><label>입력 언어</label><select id="sourceLang"><option value="auto">자동 인식</option><option value="en">영어</option><option value="ko">한국어</option></select></div>
            <div><label>출력 언어</label><select id="targetLang"><option value="ko">한국어</option><option value="en">영어</option></select></div>
        </div>
        <div id="toneSelectWrap" style="display:none;">
            <label>번역체</label>
            <div class="slider-wrap">
                <input type="range" id="toneSlider" min="0" max="2" value="0">
                <div class="slider-labels"><span>구어체</span><span>기본</span><span>문어체</span></div>
            </div>
        </div>
    </div>

    <div class="main-workspace">
        <div id="dropZone" class="file-label">📂 자막 파일 열기</div>
        <input type="file" id="srtFiles" accept=".srt,.smi,.txt" multiple>
        
        <div class="info-counter-bar" id="infoCounterBar">
            <span>Chars: <span id="charCountText">0</span></span>
            <span>Lines: <span id="lineCountText">0</span></span>
        </div>
        
        <div class="textarea-block" id="textInputBlock">
            <label>텍스트 입력</label>
            <textarea id="textInput" placeholder="파일을 열거나 여기에 텍스트를 입력하세요..." oninput="updateInputStats()"></textarea>
        </div>
        
        <div class="textarea-block" id="textOutputBlock" style="display:none;">
            <label>번역 결과</label>
            <textarea id="textOutput" readonly></textarea>
        </div>
    </div>
    
    <div class="btn-group">
        <div class="btn-row">
            <button id="startBtn" class="main-action btn-start" onclick="executeTranslationCore()">번역</button>
            <button id="pauseBtn" class="main-action btn-pause" onclick="pausePipeline()">일시정지</button>
            <button id="resumeBtn" class="main-action btn-resume" onclick="resumePipeline()">재시작</button>
            <button id="stopBtn" class="main-action btn-stop" onclick="stopPipeline()">중지</button>
        </div>
    </div>

    <div id="errorLogBox" class="error-log-box">
        <textarea id="errorTextarea" readonly></textarea>
    </div>
</div>

<script>
    const fileInput = document.getElementById('srtFiles'), textInput = document.getElementById('textInput'),
          textOutput = document.getElementById('textOutput'), textOutputBlock = document.getElementById('textOutputBlock'),
          startBtn = document.getElementById('startBtn'), pauseBtn = document.getElementById('pauseBtn'),
          resumeBtn = document.getElementById('resumeBtn'), stopBtn = document.getElementById('stopBtn');

    function updateInputStats() {
        const text = textInput.value;
        if(text.trim()) {
            document.getElementById('infoCounterBar').style.display = 'flex';
            document.getElementById('charCountText').innerText = text.length;
            document.getElementById('lineCountText').innerText = text.split(/\r?\n/).length;
        }
    }

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if(file) {
            const text = await file.text();
            textInput.value = text;
            updateInputStats();
        }
    });

    function toggleEngineRoute() {
        document.getElementById('toneSelectWrap').style.display = document.querySelector('input[name="engineRadio"]:checked').value === 'deepxl' ? 'block' : 'none';
    }

    function pausePipeline() { isPaused = true; pauseBtn.style.display = 'none'; resumeBtn.style.display = 'block'; }
    function resumePipeline() { isPaused = false; resumeBtn.style.display = 'none'; pauseBtn.style.display = 'block'; }
    function stopPipeline() { isStopped = true; hideControlButtons(); }
    function showControlButtons() { startBtn.style.display = 'none'; pauseBtn.style.display = 'block'; stopBtn.style.display = 'block'; }
    function hideControlButtons() { startBtn.style.display = 'block'; pauseBtn.style.display = 'none'; resumeBtn.style.display = 'none'; stopBtn.style.display = 'none'; }

    async function executeTranslationCore() {
        showControlButtons();
        textOutputBlock.style.display = 'block';
        textOutput.value = "번역 중...";
        
        const engine = document.querySelector('input[name="engineRadio"]:checked').value;
        const text = textInput.value;
        const tasks = text.split(/\r?\n/).map((l, i) => ({index: i, text: l})).filter(t => t.text.trim());
        const results = new Array(text.split(/\r?\n/).length).fill("");
        
        let chunkIndex = 0;
        const chunkSize = 150;
        const chunks = [];
        for(let j=0; j<tasks.length; j+=chunkSize) chunks.push(tasks.slice(j, j+chunkSize));

        async function process() {
            while(chunkIndex < chunks.length) {
                const chunk = chunks[chunkIndex++];
                const payload = chunk.map((t, idx) => `[${idx}] ${t.text}`).join('\n');
                try {
                    const translated = await requestTranslation(payload, engine);
                    translated.split('\n').forEach(l => {
                        const match = l.match(/^\[(\d+)\]\s*(.*)/);
                        if(match) results[chunk[parseInt(match[1])].index] = match[2];
                    });
                    textOutput.value = results.join('\n');
                } catch(e) {
                    alert(e.message); break;
                }
            }
            hideControlButtons();
        }
        process();
    }

    async function requestTranslation(text, engine) {
        if(engine === 'google_free') {
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ko&dt=t&q=${encodeURIComponent(text)}`);
            if(!res.ok) throw new Error("번역 실패");
            const data = await res.json();
            return data[0].map(x => x[0]).join('\n');
        } else {
            const res = await fetch("http://localhost:1188/translate", { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({text, target_lang: 'KO'}) });
            const data = await res.json();
            return data.data || data.text;
        }
    }
</script>
</body>
</html>
